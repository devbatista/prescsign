services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB_DEVELOPMENT:-prescsign_development}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT_HOST:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT_HOST:-6381}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build:
      context: .
    command: bundle exec rails server -b 0.0.0.0 -p 3000
    entrypoint: ["/rails/bin/docker-entrypoint"]
    environment:
      RAILS_ENV: development
      RAILS_LOG_LEVEL: ${RAILS_LOG_LEVEL:-debug}
      APP_HOST: ${APP_HOST:-localhost}
      APP_PORT: ${APP_PORT:-3000}
      APP_PROTOCOL: ${APP_PROTOCOL:-http}
      WAIT_FOR_DEPENDENCIES: ${WAIT_FOR_DEPENDENCIES:-true}
      WAIT_FOR_SERVICES_TIMEOUT: ${WAIT_FOR_SERVICES_TIMEOUT:-60}
      WAIT_FOR_SERVICES_SLEEP: ${WAIT_FOR_SERVICES_SLEEP:-2}
      RUN_DB_PREPARE: "true"
      ACTIVE_JOB_QUEUE_ADAPTER: ${ACTIVE_JOB_QUEUE_ADAPTER:-sidekiq}
      REDIS_URL: redis://redis:6379/1
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB_DEVELOPMENT: ${POSTGRES_DB_DEVELOPMENT:-prescsign_development}
    volumes:
      - .:/rails
      - bundle_data:/usr/local/bundle
    ports:
      - "${API_PORT_HOST:-3000}:3000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:3000/up || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

  sidekiq:
    build:
      context: .
    command: bundle exec sidekiq -C config/sidekiq.yml
    environment:
      RAILS_ENV: development
      RAILS_LOG_LEVEL: ${RAILS_LOG_LEVEL:-debug}
      WAIT_FOR_DEPENDENCIES: ${WAIT_FOR_DEPENDENCIES:-true}
      WAIT_FOR_SERVICES_TIMEOUT: ${WAIT_FOR_SERVICES_TIMEOUT:-60}
      WAIT_FOR_SERVICES_SLEEP: ${WAIT_FOR_SERVICES_SLEEP:-2}
      RUN_DB_PREPARE: "false"
      REDIS_URL: redis://redis:6379/1
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB_DEVELOPMENT: ${POSTGRES_DB_DEVELOPMENT:-prescsign_development}
    volumes:
      - .:/rails
      - bundle_data:/usr/local/bundle
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f sidekiq >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
  redis_data:
  bundle_data:
