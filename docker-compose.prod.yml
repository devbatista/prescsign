services:
  db:
    ports: []
    environment:
      POSTGRES_DB: ${POSTGRES_DB_PRODUCTION:-prescsign_production}

  redis:
    ports: []

  api:
    command: bundle exec puma -C config/puma.rb
    environment:
      RAILS_ENV: production
      RAILS_LOG_LEVEL: ${RAILS_LOG_LEVEL:-info}
      APP_HOST: ${APP_HOST:-api.local}
      APP_PROTOCOL: ${APP_PROTOCOL:-https}
      WAIT_FOR_DEPENDENCIES: ${WAIT_FOR_DEPENDENCIES:-true}
      WAIT_FOR_SERVICES_TIMEOUT: ${WAIT_FOR_SERVICES_TIMEOUT:-60}
      WAIT_FOR_SERVICES_SLEEP: ${WAIT_FOR_SERVICES_SLEEP:-2}
      RUN_DB_PREPARE: "true"
      ACTIVE_JOB_QUEUE_ADAPTER: ${ACTIVE_JOB_QUEUE_ADAPTER:-sidekiq}
      ACTIVE_STORAGE_SERVICE: ${ACTIVE_STORAGE_SERVICE:-local}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/1}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB_PRODUCTION: ${POSTGRES_DB_PRODUCTION:-prescsign_production}
      DATABASE_URL: ${DATABASE_URL:-}
    ports:
      - "${API_PORT_HOST:-3000}:3000"
    volumes: []

  sidekiq:
    command: bundle exec sidekiq -C config/sidekiq.yml
    environment:
      RAILS_ENV: production
      RAILS_LOG_LEVEL: ${RAILS_LOG_LEVEL:-info}
      WAIT_FOR_DEPENDENCIES: ${WAIT_FOR_DEPENDENCIES:-true}
      WAIT_FOR_SERVICES_TIMEOUT: ${WAIT_FOR_SERVICES_TIMEOUT:-60}
      WAIT_FOR_SERVICES_SLEEP: ${WAIT_FOR_SERVICES_SLEEP:-2}
      RUN_DB_PREPARE: "false"
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/1}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB_PRODUCTION: ${POSTGRES_DB_PRODUCTION:-prescsign_production}
      DATABASE_URL: ${DATABASE_URL:-}
    volumes: []
